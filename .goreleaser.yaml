version: 2

project_name: coe

before:
  hooks:
    - go test ./...

builds:
  - id: coe
    main: ./cmd/coe
    binary: coe
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }} -X main.builtBy=goreleaser

archives:
  - id: coe-binary
    ids:
      - coe
    formats:
      - binary
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: coe-archive
    ids:
      - coe
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - config.example.yaml
      - docs/install.md
      - scripts/install.sh
      - packaging/systemd/coe.service
      - packaging/gnome-shell-extension/coe-focus-helper@mistermorph.com/**

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

snapshot:
  version_template: "0.0.0-snapshot-{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
  replace_existing_draft: true
