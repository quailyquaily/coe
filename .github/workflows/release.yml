name: release

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install native bundle dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config g++ libfcitx5core-dev libfcitx5utils-dev libdbus-1-dev

      - name: Build release bundle
        env:
          VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('0.0.0-snapshot-{0}', github.sha) }}
        run: |
          chmod +x ./scripts/build-release-bundle.sh ./scripts/build-fcitx-module.sh ./scripts/install.sh
          ./scripts/build-release-bundle.sh "${VERSION}" "${{ matrix.arch }}" dist

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: coe-linux-${{ matrix.arch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum coe_*.tar.gz > "coe_${GITHUB_REF_NAME#v}_checksums.txt"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/coe_*.tar.gz
            dist/coe_*_checksums.txt
